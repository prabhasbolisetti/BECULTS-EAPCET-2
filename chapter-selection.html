<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter Selection - BECULTS.EAMCET</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    
    <style>
        .selection-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 0;
            min-height: calc(100vh - var(--nav-height) - 100px);
        }
        
        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: sticky;
            top: calc(var(--nav-height) + 2rem);
        }
        
        .sub-tab {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            color: #888;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        
        .sub-tab.active, .sub-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--color-white);
            border-color: rgba(255, 255, 255, 0.2);
        }
        
        .chapters-container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2rem;
        }
        
        .chapter-heading {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }
        
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        
        .checkbox-label:hover {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .checkbox-label input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: var(--color-lime);
            cursor: pointer;
        }
        
        .sticky-footer-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #000;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .selection-layout {
                grid-template-columns: 1fr;
            }
            .sidebar-menu {
                flex-direction: row;
                overflow-x: auto;
                position: relative;
                top: 0;
            }
        }
    </style>
</head>
<body style="padding-bottom: 80px;">

    <!-- Header / Nav -->
    <header class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="logo">BECULTS.EAMCET</a>
            
            <nav class="center-nav">
                <a href="index.html#hero">Home</a>
                <a href="index.html#pyqs">PYQ's</a>
                <a href="index.html#part-tests">Part Tests</a>
                <a href="index.html#performance">Performance</a>
                <a href="pricing.html">Pricing</a>
            </nav>
            
            <div class="right-utils">
                <a href="student-login.html" class="nav-link sign-in">Sign In</a>
                <a href="student-login.html" class="btn btn-outline btn-pill">ride</a>
            </div>
        </div>
    </header>

    <main style="padding-top: var(--nav-height);">
        <div class="container">
            <div class="text-center fade-in-up" style="margin-top: 2rem;">
                <div class="label-badge"><span class="dot"></span> Customize</div>
                <h2 class="section-heading" style="margin-bottom: 1rem;">select chapters</h2>
                <p style="color: #888;">Select your weak areas to formulate a targeted 3-hour Part Test.</p>
            </div>
            
            <div class="selection-layout fade-in-up delay-1">
                <!-- Sidebar -->
                <div class="sidebar-menu">
                    <div class="sub-tab active" data-target="maths">📐 Maths</div>
                    <div class="sub-tab" data-target="physics">⚛️ Physics</div>
                    <div class="sub-tab" data-target="chemistry">🧪 Chemistry</div>
                </div>
                
                <!-- Main Checkbox Area -->
                <div class="chapters-container">
                    
                    <!-- Maths Panel -->
                    <div id="maths" class="chapter-panel active">
                        <h3 class="chapter-heading">Maths - Level 1</h3>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox" checked><span>Algebra</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Vector Algebra</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Calculus</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox" checked><span>Trigonometry</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Coordinate Geometry</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Probability</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Matrices</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Complex Numbers</span></label>
                        </div>
                    </div>
                    
                    <!-- Physics Panel -->
                    <div id="physics" class="chapter-panel" style="display: none;">
                        <h3 class="chapter-heading">Physics - Core Mechanics</h3>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Kinematics</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Laws of Motion</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Work, Energy, Power</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Thermodynamics</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Electromagnetism</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Optics</span></label>
                        </div>
                    </div>
                    
                    <!-- Chemistry Panel -->
                    <div id="chemistry" class="chapter-panel" style="display: none;">
                        <h3 class="chapter-heading">Chemistry - Fundamentals</h3>
                        <div class="checkbox-grid">
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>States of Matter</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Thermodynamics</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Organic Chemistry</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Periodic Table</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Chemical Bonding</span></label>
                            <label class="checkbox-label"><input type="checkbox" class="chapter-checkbox"><span>Equilibrium</span></label>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
    
    <div class="sticky-footer-bar">
        <div>
            <span style="color: #aaa; font-size: 0.875rem;">Selected:</span>
            <strong id="selected-count" style="margin-left: 0.5rem; font-size: 1.125rem;">2 Chapters</strong>
        </div>
        <button id="start-test-btn" class="btn btn-primary btn-pill" onclick="startTest()">Start 3-Hour Test</button>
    </div>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
    <script>
        // Tab switching logic
        let selectedSubject = 'MATHS'; // Default subject
        const tabs = document.querySelectorAll('.sub-tab');
        const panels = document.querySelectorAll('.chapter-panel');
        const countDisplay = document.getElementById('selected-count');

        function updateSelectedCount() {
            const activePanel = document.querySelector('.chapter-panel.active');
            if (!activePanel) return;
            const count = activePanel.querySelectorAll('.chapter-checkbox:checked').length;
            countDisplay.textContent = `${count} Chapter${count !== 1 ? 's' : ''}`;
        }
        
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const target = tab.getAttribute('data-target');
                selectedSubject = target.toUpperCase();
                
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                panels.forEach(panel => {
                    const isActive = panel.id === target;
                    panel.style.display = isActive ? 'block' : 'none';
                    panel.classList.toggle('active', isActive);
                });

                updateSelectedCount();
            });
        });

        // Count logic
        const chapterMappings = {
            'CHEMISTRY': {
                'States of Matter': [],
                'Thermodynamics': [],
                'Organic Chemistry': ['Aldehydes, Ketones and Carboxylic Acids', 'Properties of Carbonyl Compounds'],
                'Periodic Table': ['Classification of Elements and Periodicity'],
                'Chemical Bonding': ['Chemical Bonding', 'Dipole Moment and Bond Polarity', 'VSEPR Theory and Hybridisation', 'Chemical Bonding and Molecular Structure'],
                'Equilibrium': []
            },
            'PHYSICS': {
                'Kinematics': ['Motion in a Straight Line', 'Motion in a Plane with Constant Acceleration'],
                'Laws of Motion': ['Motion in a Straight Line'],
                'Work, Energy, Power': ['Motion in a Straight Line'],
                'Thermodynamics': [],
                'Electromagnetism': [],
                'Optics': []
            },
            'MATHS': {
                'Algebra': ['Relations and Functions'],
                'Vector Algebra': ['Vectors'],
                'Calculus': [],
                'Trigonometry': [],
                'Coordinate Geometry': [],
                'Probability': [],
                'Matrices': [],
                'Complex Numbers': []
            }
        };

        const checkboxes = document.querySelectorAll('.chapter-checkbox');
        
        checkboxes.forEach(cb => {
            cb.addEventListener('change', updateSelectedCount);
        });

        updateSelectedCount();

        // Start test with subject and selected chapters
        function startTest() {
            const activePanel = document.querySelector('.chapter-panel.active');
            if (!activePanel) return;

            const selectedLabels = Array.from(activePanel.querySelectorAll('.chapter-checkbox:checked'))
                .map(cb => cb.nextElementSibling.textContent.trim());

            if (selectedLabels.length === 0) {
                alert('Please select at least one chapter before starting the test.');
                return;
            }

            const mappedChapters = selectedLabels.flatMap(label => {
                const mapping = chapterMappings[selectedSubject] && chapterMappings[selectedSubject][label];
                return Array.isArray(mapping) ? mapping : [label];
            }).filter(Boolean);

            if (mappedChapters.length === 0) {
                alert('No question chapters are available for the selected chapter(s). Please select a different chapter.');
                return;
            }

            const chapterParam = encodeURIComponent(JSON.stringify(mappedChapters));
            window.location.href = `test.html?subject=${selectedSubject}&chapters=${chapterParam}`;
        }
    </script>
</body>
</html>
