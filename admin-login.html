<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - BECULTS.EAMCET</title>
    <meta name="description" content="Admin login for BECULTS.EAMCET platform.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body class="admin-page">

    <header class="navbar">
        <div class="container navbar-inner">
            <a href="index.html" class="logo">BECULTS.EAMCET</a>
            
            <nav class="center-nav">
                <a href="index.html">Home</a>
                <a href="pyqs.html">PYQ's</a>
                <a href="part-tests.html">Part Tests</a>
                <a href="performance.html">Performance</a>
            </nav>
            
            <div class="right-utils">
                <a href="student-login.html" class="nav-link sign-in">Sign In</a>
                <a href="student-login.html" class="btn btn-outline btn-pill">ride</a>
            </div>
        </div>
    </header>

    <main style="padding-top: var(--nav-height); min-height: calc(100vh - var(--nav-height)); display: flex; align-items: center; justify-content: center;">
        <div class="container fade-in-up">
            <div class="auth-card">
                <div class="label-badge"><span class="dot" style="background-color: var(--color-error, #ff4c4c)"></span> Admin Portal</div>
                <h2 style="font-size: 2.5rem; margin-bottom: 2rem;">Admin Login</h2>
                
                <form id="auth-form" class="admin-form">
                    <div class="form-group">
                        <label class="form-label" for="name">Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="Enter your full name" pattern="[A-Za-z\s]+" title="Name should only contain alphabets" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <input type="email" id="email" class="form-input" placeholder="Enter your email address" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" class="form-input" placeholder="10-digit mobile number" pattern="\d{10}" title="Please enter a valid 10-digit phone number" required>
                    </div>
                    
                    
                    <button type="submit" class="btn btn-primary btn-pill" style="width: 100%; font-size: 1.125rem; padding: 1rem; background-color: #ff4c4c; border-color: #ff4c4c;">Login as Admin</button>
                    
                    <p style="margin-top: 1.5rem; font-size: 0.875rem; color: #888;">
                        Are you a student? <a href="student-login.html" style="color: var(--color-white); text-decoration: underline;">Student Login</a>
                    </p>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
